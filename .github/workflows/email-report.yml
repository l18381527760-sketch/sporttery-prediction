name: Manual Email Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  email:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && vars.ALLOW_MANUAL_EMAIL_DIAGNOSTIC == "true"
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GMAIL_ADDRESS: l18381527760@gmail.com
      REPORT_RECIPIENT: l18381527760@gmail.com
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: Checkout latest report
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send report image
        run: python send_daily_email.py
