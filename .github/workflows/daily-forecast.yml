name: Daily Sporttery Forecast

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Beijing business date (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    # 12:15 Beijing time, after the daily Sporttery data update.
    - cron: "15 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  forecast:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Generate required daily forecast
        id: base_forecast
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          set -euo pipefail
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          NORMALIZED_TARGET_DATE="$(date -d "$TARGET_DATE" +%F)"
          if [ "$NORMALIZED_TARGET_DATE" != "$TARGET_DATE" ]; then
            echo "target_date must be exact YYYY-MM-DD" >&2
            exit 1
          fi
          python import_sporttery.py --date "$TARGET_DATE"
          python build_historical_features.py
          python predict_today.py --date "$TARGET_DATE"

      - name: Collect optional market evidence
        continue-on-error: true
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          python collect_market_heat.py --date "$TARGET_DATE"

      - name: Generate optional draw alerts
        continue-on-error: true
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          python generate_draw_alert.py --date "$TARGET_DATE"

      - name: Build base website and image
        if: always() && steps.base_forecast.outcome == 'success'
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          set -euo pipefail
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          REPORT_BUILD_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-forecast"
          export REPORT_BUILD_ID
          python build_site.py --date "$TARGET_DATE" --stage forecast
          python build_daily_image.py --date "$TARGET_DATE" --stage forecast
          SOURCE_COMMIT_SHA="$(git rev-parse HEAD)"
          GENERATED_AT_BJT="$(date --iso-8601=seconds)"
          python report_status.py --date "$TARGET_DATE" --phase forecast \
            --build-id "$REPORT_BUILD_ID" \
            --source-commit "$SOURCE_COMMIT_SHA" \
            --generated-at "$GENERATED_AT_BJT"

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily Sporttery forecast"
          file_pattern: "data output web"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
