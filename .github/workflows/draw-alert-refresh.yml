name: Draw Alert Refresh

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Beijing business date (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    # 13:30 Beijing time, after new market snapshots are available.
    - cron: "30 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  refresh:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main report
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Refresh required decision plan
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          NORMALIZED_TARGET_DATE="$(date -d "$TARGET_DATE" +%F)"
          if [ "$NORMALIZED_TARGET_DATE" != "$TARGET_DATE" ]; then
            echo "target_date must be exact YYYY-MM-DD" >&2
            exit 1
          fi
          LOCK_PATH="output/plan_lock_${TARGET_DATE}.json"
          if [ -e "$LOCK_PATH" ]; then
            if python plan_lock.py is-locked --date "$TARGET_DATE"; then
              echo "Valid plan lock exists for $TARGET_DATE; preserving locked plan and odds"
            else
              echo "Existing plan lock is invalid for $TARGET_DATE; refusing to rewrite locked artifacts" >&2
              exit 1
            fi
          else
            python import_sporttery.py --date "$TARGET_DATE"
            python capture_odds_snapshot.py --date "$TARGET_DATE" --phase decision
            python predict_today.py --date "$TARGET_DATE"
            python generate_betting_plan.py --date "$TARGET_DATE"
            python plan_lock.py lock \
              --date "$TARGET_DATE" \
              --locked-at "$(date --iso-8601=seconds)" \
              --source sporttery
          fi

      - name: Refresh optional market evidence
        continue-on-error: true
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          python collect_market_heat.py --date "$TARGET_DATE"

      - name: Refresh draw alerts
        continue-on-error: true
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          python generate_draw_alert.py --date "$TARGET_DATE"

      - name: Refresh draw alert ledger
        run: python draw_alert_ledger.py --settle

      - name: Rebuild report from the latest committed data
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          NORMALIZED_TARGET_DATE="$(date -d "$TARGET_DATE" +%F)"
          if [ "$NORMALIZED_TARGET_DATE" != "$TARGET_DATE" ]; then
            echo "target_date must be exact YYYY-MM-DD" >&2
            exit 1
          fi
          REPORT_BUILD_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-decision"
          export REPORT_BUILD_ID
          python build_site.py
          python build_daily_image.py
          SOURCE_COMMIT_SHA="$(git rev-parse HEAD)"
          GENERATED_AT_SHANGHAI="$(date --iso-8601=seconds)"
          python report_status.py --date "$TARGET_DATE" --phase decision \
            --build-id "$REPORT_BUILD_ID" \
            --source-commit "$SOURCE_COMMIT_SHA" \
            --generated-at "$GENERATED_AT_SHANGHAI"

      - name: Commit refreshed files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh draw alert report"
          file_pattern: "data output web"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
