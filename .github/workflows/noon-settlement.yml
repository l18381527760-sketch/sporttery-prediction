name: Noon Sporttery Settlement

on:
  workflow_dispatch:
  schedule:
    # 12:00 Beijing time
    - cron: "0 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  settlement:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update results and ledger
        continue-on-error: true
        run: |
          python update_sporttery_results.py

      - name: Rebuild ledger and website
        run: |
          python generate_betting_plan.py --settle-only
          python build_site.py

      - name: Commit settlement files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Sporttery settlement"
          file_pattern: "data/bet_results.csv output/betting_ledger.csv web/index.html"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
