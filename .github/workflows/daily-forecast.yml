name: Daily Sporttery Forecast

on:
  workflow_dispatch:
  schedule:
    # 12:15 Beijing time, after the daily Sporttery data update.
    - cron: "15 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  forecast:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Generate required base forecast and plan
        id: base_forecast
        run: |
          TARGET_DATE="$(date +%F)"
          python import_sporttery.py --date "$TARGET_DATE"
          python build_historical_features.py
          python predict_today.py --date "$TARGET_DATE"
          python generate_betting_plan.py --date "$TARGET_DATE"

      - name: Capture opening odds
        continue-on-error: true
        run: |
          TARGET_DATE="$(date +%F)"
          python capture_odds_snapshot.py --date "$TARGET_DATE" --phase opening

      - name: Collect optional market evidence
        continue-on-error: true
        run: |
          TARGET_DATE="$(date +%F)"
          python collect_market_heat.py --date "$TARGET_DATE"

      - name: Generate optional draw alerts
        continue-on-error: true
        run: |
          TARGET_DATE="$(date +%F)"
          python generate_draw_alert.py --date "$TARGET_DATE"

      - name: Update optional draw alert ledger
        continue-on-error: true
        run: python draw_alert_ledger.py --settle

      - name: Build final website and image
        if: always() && steps.base_forecast.outcome == 'success'
        run: |
          python build_site.py
          python build_daily_image.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily Sporttery forecast"
          file_pattern: "data output web"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
