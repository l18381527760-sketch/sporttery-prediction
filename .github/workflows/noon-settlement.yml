name: Afternoon Sporttery Settlement

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Beijing business date (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    # 13:45 Beijing time, before the 14:00 email window.
    - cron: "45 5 * * *"
    # Retry at 14:05 in case results or the first scheduled run are delayed.
    - cron: "5 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  settlement:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Update results and settle confirmed canonical rows
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          set -euo pipefail
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          NORMALIZED_TARGET_DATE="$(date -d "$TARGET_DATE" +%F)"
          if [ "$NORMALIZED_TARGET_DATE" != "$TARGET_DATE" ]; then
            echo "target_date must be exact YYYY-MM-DD" >&2
            exit 1
          fi
          TODAY="$TARGET_DATE"
          SETTLEMENT_DATE="$(date -d "$TODAY - 1 day" +%F)"
          python update_sporttery_results.py --date "$SETTLEMENT_DATE" --reconcile-days 7
          python build_historical_features.py
          # The revalidation workflow is the only path that ingests confirmed rows.
          python generate_betting_plan.py --settle-only
          python draw_model_learning.py --train --date "$TODAY"
          python model_metrics.py
          REPORT_BUILD_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-settlement"
          export REPORT_BUILD_ID
          python build_site.py --date "$TODAY" --stage settlement
          python build_daily_image.py --date "$TODAY" --stage settlement
          SOURCE_COMMIT_SHA="$(git rev-parse HEAD)"
          GENERATED_AT_SHANGHAI="$(date --iso-8601=seconds)"
          python report_status.py --date "$TODAY" --phase settlement --settled-through "$SETTLEMENT_DATE" \
            --build-id "$REPORT_BUILD_ID" \
            --source-commit "$SOURCE_COMMIT_SHA" \
            --generated-at "$GENERATED_AT_SHANGHAI"

      - name: Commit settlement files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Sporttery settlement"
          file_pattern: "data output web"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
