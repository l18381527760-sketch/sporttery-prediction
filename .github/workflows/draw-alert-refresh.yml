name: Provisional Decision Refresh

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Beijing business date (YYYY-MM-DD)
        required: false
        type: string
  schedule:
    # 13:30 Beijing time, after live decision odds are available.
    - cron: "30 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  refresh:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main report
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Create provisional decision generation
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          NORMALIZED_TARGET_DATE="$(date -d "$TARGET_DATE" +%F)"
          if [ "$NORMALIZED_TARGET_DATE" != "$TARGET_DATE" ]; then
            echo "target_date must be exact YYYY-MM-DD" >&2
            exit 1
          fi
          python import_sporttery.py --date "$TARGET_DATE"
          LIVE_PATH="$(python capture_odds_snapshot.py --date "$TARGET_DATE" --phase decision --live --print-path)"
          python predict_today.py --date "$TARGET_DATE"
          PROVISIONAL_AT_BJT="$(date --iso-8601=ns)"
          python decision_bundle.py --date "$TARGET_DATE" --locked-at "$PROVISIONAL_AT_BJT" --decision-snapshot "$LIVE_PATH"
          python provisional_plan.py --date "$TARGET_DATE" --generated-at "$PROVISIONAL_AT_BJT"

      - name: Publish provisional website and status
        env:
          REQUESTED_TARGET_DATE: ${{ inputs.target_date }}
        run: |
          TARGET_DATE="$REQUESTED_TARGET_DATE"
          TARGET_DATE="${TARGET_DATE:-$(date +%F)}"
          REPORT_BUILD_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-provisional"
          export REPORT_BUILD_ID
          python build_site.py --date "$TARGET_DATE" --stage provisional
          python build_daily_image.py --date "$TARGET_DATE" --stage provisional
          SOURCE_COMMIT_SHA="$(git rev-parse HEAD)"
          GENERATED_AT_BJT="$(date --iso-8601=seconds)"
          python report_status.py --date "$TARGET_DATE" --phase provisional \
            --build-id "$REPORT_BUILD_ID" \
            --source-commit "$SOURCE_COMMIT_SHA" \
            --generated-at "$GENERATED_AT_BJT"

      - name: Commit provisional files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Publish provisional Sporttery decision"
          file_pattern: "data output web"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
