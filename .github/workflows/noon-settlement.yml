name: Afternoon Sporttery Settlement

on:
  workflow_dispatch:
  schedule:
    # 13:45 Beijing time, before the 14:00 email window.
    - cron: "45 5 * * *"
    # Retry at 14:05 in case results or the first scheduled run are delayed.
    - cron: "5 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  settlement:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image fonts and library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet pillow

      - name: Update results and ledger
        run: |
          python update_sporttery_results.py
          python build_historical_features.py

      - name: Rebuild ledger and website
        run: |
          python generate_betting_plan.py --settle-only
          python build_site.py
          python build_daily_image.py

      - name: Commit settlement files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Sporttery settlement"
          file_pattern: "data/bet_results.csv data/team_history_features.csv output/betting_ledger.csv output/model_metrics.json web/index.html web/daily-report.png"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
