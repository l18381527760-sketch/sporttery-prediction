name: Sporttery Odds Snapshots

on:
  workflow_dispatch:
  schedule:
    # Frequent snapshots improve the chance of recording odds near kickoff.
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  snapshot:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capture live monitoring snapshot
        run: |
          TARGET_DATE="$(date +%F)"
          python capture_odds_snapshot.py --date "$TARGET_DATE" --phase monitoring --live

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Capture Sporttery odds snapshot"
          file_pattern: "data/odds_snapshots"
